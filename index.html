<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Rei Sound Box</title>

<style>
body {
  text-align: center;
  background: #f3e8ff;
  font-family: Arial, sans-serif;
  padding: 40px;
  overflow: hidden;
}

h1 {
  color: #a855f7;
  margin-bottom: 30px;
}

/* ボタン */
button {
  display: block;
  width: 260px;
  margin: 12px auto;
  padding: 18px;
  font-size: 18px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(45deg, #c084fc, #f0abfc);
  color: white;
  cursor: pointer;
  box-shadow: 0 5px 10px rgba(0,0,0,0.2);
  transition: 0.2s;
}

button:active {
  transform: scale(0.95);
}

/* ✨キラキラ✨ */
.sparkle {
  position: fixed;
  width: 10px;
  height: 10px;
  background: white;
  border-radius: 50%;
  opacity: 0.8;
  animation: fall linear infinite;
}

@keyframes fall {
  0% {
    transform: translateY(-10px);
    opacity: 0;
  }
  50% {
    opacity: 1;
  }
  100% {
    transform: translateY(100vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<h1>🎶Rei Sound Box🎶</h1>

<button onclick="play('a')">サンドリヨン</button>
<button onclick="play('b')">はまぐり</button>
<button onclick="play('c')">喝だ！</button>
<button onclick="play('d')">ミサトさん</button>
<button onclick="play('e')">枠外たすからん</button>
<button onclick="play('f')">まつあきの歌</button>

<audio id="a" src="sound1.mp3"></audio>
<audio id="b" src="sound2.mp3"></audio>
<audio id="c" src="sound3.mp3"></audio>
<audio id="d" src="sound4.mp3"></audio>
<audio id="e" src="sound5.mp3"></audio>
<audio id="f" src="sound6.mp3"></audio>

<script>
function play(id) {
  const audio = document.getElementById(id);
  audio.currentTime = 0;
  audio.play();
}

/* キラキラ生成 */
for (let i = 0; i < 30; i++) {
  let s = document.createElement("div");
  s.className = "sparkle";
  s.style.left = Math.random() * 100 + "vw";
  s.style.animationDuration = (3 + Math.random() * 5) + "s";
  s.style.width = s.style.height = (5 + Math.random() * 8) + "px";
  document.body.appendChild(s);
}
</script>

</body>
</html>
